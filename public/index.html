<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Life Recorder</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">
          <p class="eyebrow">Recorder</p>
          <h1 id="app-name">Life Recorder</h1>
          <p class="muted">Nhap mot khoi noi dung. He thong tu chuan hoa va dua vao folder phu hop.</p>
        </div>

        <nav class="tabs">
          <button class="tab is-active" data-tab="capture">Capture</button>
          <button class="tab" data-tab="folders">Folders</button>
          <button class="tab" data-tab="settings">Settings</button>
          <button class="tab" data-tab="history">History</button>
        </nav>

        <section>
          <div class="section-title">
            <h2>Folder Tree</h2>
            <span id="folder-count" class="pill"></span>
          </div>
          <div id="folder-tree" class="tree"></div>
        </section>
      </aside>

      <main class="main">
        <section class="panel tab-panel is-active" data-panel="capture">
          <div class="section-title">
            <h2>Quick Capture</h2>
            <span id="save-status" class="muted"></span>
          </div>

          <form id="note-form" class="stack">
            <label>
              <span>Content</span>
              <textarea id="raw-content-input" name="rawContent" rows="18" required></textarea>
            </label>

            <div class="actions">
              <button type="submit" class="primary">Save</button>
            </div>
          </form>

          <div id="note-result" class="result hidden"></div>
        </section>

        <section class="panel tab-panel" data-panel="folders">
          <div class="section-title">
            <div>
              <h2 id="folder-view-title">Folder Notes</h2>
              <p id="folder-view-description" class="muted"></p>
            </div>
            <select id="folder-view-select" class="compact-select"></select>
          </div>
          <div id="folder-notes-list" class="stack"></div>
        </section>

        <section class="panel tab-panel" data-panel="settings">
          <div class="section-title">
            <h2>Settings</h2>
            <span class="muted">Them folder bang popup de AI tao metadata co nghia.</span>
          </div>

          <form id="settings-form" class="stack">
            <div class="grid two">
              <label>
                <span>App name</span>
                <input type="text" id="settings-app-name" maxlength="80" required />
              </label>
              <label>
                <span>Default AI CLI</span>
                <select id="settings-ai-cli">
                  <option value="codex">Codex CLI</option>
                  <option value="copilot">Copilot CLI</option>
                </select>
              </label>
            </div>

            <div class="section-title">
              <h3>Folders</h3>
              <button type="button" id="open-folder-modal-button" class="secondary">Add Folder</button>
            </div>

            <div id="folder-editor" class="stack"></div>

            <div class="actions">
              <button type="submit" class="primary">Save Settings</button>
            </div>
          </form>
        </section>

        <section class="panel tab-panel" data-panel="history">
          <div class="section-title">
            <h2>Activity</h2>
            <button type="button" id="refresh-history-button" class="secondary">Refresh</button>
          </div>
          <div id="history-list" class="history-list"></div>
        </section>
      </main>
    </div>

    <div id="folder-modal" class="modal hidden" aria-hidden="true">
      <div class="modal-card">
        <div class="section-title">
          <h2>New Folder</h2>
          <button type="button" id="close-folder-modal-button" class="ghost">Close</button>
        </div>

        <form id="folder-draft-form" class="stack">
          <label>
            <span>Mo ta y nghia folder muon tao</span>
            <textarea id="folder-intent-input" rows="6" required></textarea>
          </label>

          <div class="actions">
            <button type="submit" class="primary">Generate Folder</button>
          </div>
        </form>

        <div id="folder-draft-result" class="result hidden"></div>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
  </html>
